function getExEquipItem(ex, equipDb) {
  return equipDb.find(e => e.label === ex.equipment) || null;
}
function isExAvail(ex, availEquip, equipDb) {
  const item = getExEquipItem(ex, equipDb);
  return !item || item.alwaysAvail || availEquip.has(item.id);
}

function buildSequence(exercises, numCircuits, numPeople) {
  const seq = [];
  for (let c = 0; c < numCircuits; c++)
    exercises.forEach((ex,i) => seq.push({ ...ex, circuit:c+1, slotInCircuit:i }));
  for (let p = 0; p < numPeople - 1; p++)
    seq.push({ ...seq[0], _padding:true });
  return seq;
}
function validateSharedKit(exercises) {
  const issues = [];
  for (let i = 0; i < exercises.length; i++) {
    const a=exercises[i], b=exercises[(i+1)%exercises.length];
    if (a.shared && a.shared===b.shared)
      issues.push(`"${a.name}" and "${b.name}" both need the ${a.shared}`);
  }
  return issues;
}

// ── Circuit optimiser ────────────────────────────────────────────────────────
// Rules applied in order:
// 1. No two adjacent exercises share the same "shared" equipment (kettlebell/medball)
// 2. No two adjacent exercises hit the same primary muscle group
// 3. Alternate upper/lower/core/cardio as much as possible
// 4. Place high-intensity (power/cardio) exercises away from each other
// 5. Start with compound movements, finish with core/mobility
function optimiseCircuit(exercises) {
  if (exercises.length <= 1) return exercises;

  const MUSCLE_GROUP = (ex) => {
    const m = (ex.muscles||"").toLowerCase();
    if (m.includes("quad")||m.includes("glute")||m.includes("hamstring")||m.includes("lunge")||m.includes("squat")) return "lower";
    if (m.includes("chest")||m.includes("shoulder")||m.includes("tricep")||m.includes("bicep")||m.includes("back")||m.includes("row")) return "upper";
    if (m.includes("core")||m.includes("abs")||m.includes("oblique")||m.includes("plank")) return "core";
    return "cardio";
  };

  // Score a sequence — lower is better
  const score = (seq) => {
    let s = 0;
    for (let i = 0; i < seq.length; i++) {
      const a = seq[i], b = seq[(i+1)%seq.length];
      // Heavy penalty for shared equipment clash
      if (a.shared && a.shared === b.shared) s += 100;
      // Penalty for same muscle group back-to-back
      if (MUSCLE_GROUP(a) === MUSCLE_GROUP(b)) s += 20;
      // Penalty for two power/cardio back-to-back
      if ((a.type==="power"||a.type==="cardio") && (b.type==="power"||b.type==="cardio")) s += 10;
    }
    // Prefer core/mobility near end
    const last = seq[seq.length-1];
    if (last.type==="core"||last.type==="mobility") s -= 5;
    // Prefer compound strength/power near start
    const first = seq[0];
    if (first.type==="strength"||first.type==="power") s -= 3;
    return s;
  };

  // Greedy nearest-neighbour with random restarts (fast enough for ≤15 exercises)
  const shuffle = (arr) => [...arr].sort(()=>Math.random()-0.5);
  let best = [...exercises], bestScore = score(best);

  for (let attempt = 0; attempt < 200; attempt++) {
    const candidate = shuffle(exercises);
    const s = score(candidate);
    if (s < bestScore) { best = candidate; bestScore = s; }
  }

  // Final pass: if any adjacent shared-equipment clash remains, force-swap
  const result = [...best];
  for (let i = 0; i < result.length * 2; i++) {
    const idx = i % result.length;
    const next = (idx+1) % result.length;
    if (result[idx].shared && result[idx].shared === result[next].shared) {
      // Find a non-clashing swap partner
      for (let j = 2; j < result.length; j++) {
        const swap = (idx + j) % result.length;
        if (!result[swap].shared || result[swap].shared !== result[idx].shared) {
          [result[next], result[swap]] = [result[swap], result[next]];
          break;
        }
      }
    }
  }
  return result;
}

  const [paused,       setPaused]       = useState(false);
  const [reviewFilter, setReviewFilter] = useState("all");
  const [reviewSearch, setReviewSearch] = useState("");
  const [optimised,    setOptimised]    = useState(false);
  const [showUnavail,  setShowUnavail]  = useState(false);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [availEquip,   setAvailEquip]   = useState(() => {
    try {
      const s = localStorage.getItem("ct_avail_equip");
      if (s) {
        const parsed = JSON.parse(s);
        // Migrate old group-id format to item-id format
        const isOldFormat = parsed.some(id => ["kettlebell","medball","bands","gliders"].includes(id));
        if (!isOldFormat) return new Set(parsed);
      }
    } catch {}
    return new Set(INITIAL_EQUIP_DB.filter(e=>!e.alwaysAvail).map(e=>e.id));
  });
  const [equipDb, setEquipDb] = useState(() => {
    try { const s=localStorage.getItem("ct_equip_db"); return s?JSON.parse(s):INITIAL_EQUIP_DB; }
    catch { return INITIAL_EQUIP_DB; }
  });
  const timerRef  = useRef(null);
  const seqRef    = useRef([]);
  const audioRef  = useRef(null);
  const spokenRef = useRef(new Set());

  useEffect(() => {
    localStorage.setItem("ct_avail_equip", JSON.stringify([...availEquip]));
  }, [availEquip]);
  useEffect(() => {
    localStorage.setItem("ct_equip_db", JSON.stringify(equipDb));
  }, [equipDb]);

  function toggleEquip(id) {
    setAvailEquip(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  }

  useEffect(() => {
    const onChange = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener("fullscreenchange", onChange);
    return () => document.removeEventListener("fullscreenchange", onChange);
  }, []);

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  }

  const handleSwap = (drag, targetIndex) => {
    setChosen(prev => {
      const nc = [...prev];
      if (drag.source==="chosen") { const [m]=nc.splice(drag.index,1); nc.splice(targetIndex,0,m); }
      else nc[targetIndex] = db[drag.index];
      return nc;
    });
  };
  // dragState kept as empty stub — drag UI replaced by checklist
  const dragging = null;
  const dragOver = null;

  // When numExercises changes, trim or extend chosen list
  useEffect(() => {
    setChosen(prev => {
      const updated = prev.map(c => db.find(e=>e.id===c.id)||c);
      if (updated.length > numExercises) return updated.slice(0, numExercises);
      if (updated.length < numExercises) {
        const ids = new Set(updated.map(e=>e.id));
        const pool = db.filter(e=>!ids.has(e.id));
        return [...updated, ...pool.slice(0, numExercises - updated.length)];
      }
      return updated;
    });
  }, [numExercises, db]);

  const seq        = seqRef.current;
  const totalSlots = seq.length;
  const totalTime  = totalSlots * (workSec+restSec);
  const progPct    = Math.min((elapsed/Math.max(totalTime,1))*100, 100);
  const mm         = Math.floor(elapsed/60).toString().padStart(2,"0");
  const ss         = (elapsed%60).toString().padStart(2,"0");
  const isResting  = phase==="rest";
  const masterSlot = seq[masterIdx];
  const mType      = masterSlot ? (TYPE_COLORS[masterSlot.type]||TYPE_COLORS.strength) : TYPE_COLORS.strength;
  const circ       = 2*Math.PI*54;
  const tMax       = isResting ? restSec : workSec;
  const isCD       = !isResting && timeLeft<=10;
  const ringColor  = paused?"#3a4a5a":isResting?"#4ade80":isCD?"#f87171":mType.accent;
  const dash       = circ - (timeLeft/Math.max(tMax,1))*circ;

  // ── Audio ─────────────────────────────────────────────────────────────
  const initAudio = () => {
    try {
      if (!audioRef.current) audioRef.current = new (window.AudioContext||window.webkitAudioContext)();
      if (audioRef.current.state==="suspended") audioRef.current.resume();
      const p=new SpeechSynthesisUtterance(" "); p.volume=0; window.speechSynthesis.speak(p);
    } catch(e){}
  };
  const beep = (freq=880,dur=0.12,vol=0.45,delay=0) => {
    try {
      const ctx=audioRef.current; if(!ctx||ctx.state!=="running") return;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=freq; o.type="sine";
      const t=ctx.currentTime+delay;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01); g.gain.linearRampToValueAtTime(0,t+dur);
      o.start(t); o.stop(t+dur+0.05);
    } catch(e){}
  };
  const speak = (text,rate=1.1) => {
    try { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=rate; u.volume=1.0; window.speechSynthesis.speak(u); } catch(e){}
  };
  const playStart = () => { beep(880,0.15,0.6); beep(1320,0.22,0.6,0.18); };

  useEffect(() => {
    if (screen!=="active"||paused) return;
    if (phase==="work"&&timeLeft<=10&&timeLeft>0) {
      if (!spokenRef.current.has(timeLeft)) {
        spokenRef.current.add(timeLeft);
        if (timeLeft===1) { beep(1100,0.3,0.6); speak("Go!",1.2); }
        else speak(String(timeLeft),1.15);
      }
    }
    if (phase==="rest"&&timeLeft===5) speak("Get ready",1.0);
  }, [timeLeft, phase, screen, paused]);

  useEffect(() => {
    if (phase==="work") spokenRef.current=new Set();
    if (screen==="active"&&phase==="work"&&!paused) { playStart(); speak("Go!", 1.2); }
  }, [phase, masterIdx]);

  const stopTimer = () => { if (timerRef.current) clearInterval(timerRef.current); };
  useEffect(() => {
    if (screen==="active"&&!paused) {
      timerRef.current = setInterval(()=>{ setTimeLeft(t=>t<=1?0:t-1); setElapsed(e=>e+1); },1000);
      return stopTimer;
    }
  }, [screen, phase, masterIdx, paused]);

  useEffect(() => {
    if (timeLeft!==0) return;
    stopTimer();
    if (phase==="work") {
      if (masterIdx+1>=totalSlots) setScreen("done");
      else { setMasterIdx(i=>i+1); setTimeLeft(restSec); setPhase("rest"); }
    } else { setTimeLeft(workSec); setPhase("work"); }
  }, [timeLeft]);

  const startSession = () => {
    initAudio();
    seqRef.current = buildSequence(chosen, numCircuits, numPeople);
    setMasterIdx(numPeople - 1); setElapsed(0); setTimeLeft(workSec);
    setPhase("work"); setFocusPerson(null); setPaused(false);
    setScreen("active");
  };
  const goHome = () => {
    stopTimer(); seqRef.current=[];
    setScreen("setup"); setMasterIdx(0); setTimeLeft(workSec);
    setElapsed(0); setPhase("work"); setFocusPerson(null); setPaused(false);
  };
  const kitIssues = validateSharedKit(chosen);
  const libAvail  = db.filter(ex=>!chosen.find(c=>c.id===ex.id));
  const estMins   = Math.round(numCircuits*chosen.length*(workSec+restSec)/60);

  if (screen==="admin") return <AdminScreen db={db} setDb={setDb} onBack={()=>setScreen("setup")} initAudio={initAudio} beep={beep} availEquip={availEquip} toggleEquip={toggleEquip} equipDb={equipDb} setEquipDb={setEquipDb}/>;

  // ── SETUP ────────────────────────────────────────────────────────────
  if (screen==="setup") return (
    <div style={S.page}>
      <div style={{width:"100%", maxWidth:600}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:32}}>
          <div style={{fontSize:13, letterSpacing:"0.2em", color:"#718096", fontWeight:600}}>CIRCUIT TRAINING</div>
          <div style={{display:"flex", gap:8}}>
            <button onClick={toggleFullscreen} style={{...S.btnSec, padding:"8px 11px", fontSize:14, letterSpacing:0}} title={isFullscreen?"Exit fullscreen":"Fullscreen"}>
              {isFullscreen ? "⊡" : "⛶"}
            </button>
            <button onClick={()=>setScreen("admin")} style={{...S.btnSec, padding:"8px 14px", fontSize:11}}>⚙ ADMIN</button>
          </div>
        </div>
        <div style={S.h1}>Set up<br/>your session</div>

        <div style={{marginBottom:28}}>
          <div style={S.label}>Circuits</div>
          <div style={{display:"flex", gap:10}}>{[1,2,3,4].map(n=><button key={n} onClick={()=>setNumCircuits(n)} style={S.seg(numCircuits===n)}>{n}</button>)}</div>
        </div>

        <div style={{marginBottom:28}}>
          <div style={S.label}>People</div>
          <div style={{display:"flex", gap:10}}>{[1,2,3,4].map(n=><button key={n} onClick={()=>setNumPeople(n)} style={S.seg(numPeople===n, "#4ade80")}>{n}</button>)}</div>
        </div>

        <div style={{marginBottom:28}}>
          <div style={S.label}>Names (optional)</div>
          <div style={{display:"grid", gridTemplateColumns:numPeople>2?"1fr 1fr":"1fr", gap:10}}>
            {Array.from({length:numPeople},(_,i)=>(
              <div key={i} style={{display:"flex", alignItems:"center", gap:10, background:"#1a2035", border:"1px solid #2d3a50", borderRadius:10, padding:"11px 14px"}}>
                <div style={{width:22, height:22, borderRadius:6, background:PERSON_COLORS[i], display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:"#042008", flexShrink:0}}>{i+1}</div>
                <input value={names[i]} onChange={e=>{const n=[...names];n[i]=e.target.value;setNames(n);}} maxLength={10}
                  placeholder={`Person ${i+1}`}
                  style={{background:"transparent", border:"none", outline:"none", color:"#e8eaed", fontSize:14, fontFamily:"'DM Mono',monospace", width:"100%"}}/>
              </div>
            ))}
          </div>
        </div>

        <div style={{marginBottom:28}}>
          <div style={S.label}>Interval Timing</div>
          <div style={{...S.card, display:"flex", flexDirection:"column", gap:24}}>
            <Slider label="Work" value={workSec} min={20} max={240} step={5} onChange={setWorkSec} accent="#4ade80"/>
            <Slider label="Rest" value={restSec} min={10} max={45}  step={5} onChange={setRestSec} accent="#60a5fa"/>
          </div>
        </div>

        <div style={{marginBottom:28}}>
          <div style={S.label}>Equipment</div>
          <div style={{display:"flex", flexDirection:"column", gap:6}}>
            {equipDb.filter(e=>!e.alwaysAvail).map(item => {
              const on = availEquip.has(item.id);
              return (
                <button key={item.id} onClick={()=>toggleEquip(item.id)} style={{
                  display:"flex", alignItems:"center", gap:12,
                  padding:"10px 14px", borderRadius:10,
                  background: on ? "#0a2a1a" : "#111520",
                  border: `1px solid ${on ? "#4ade8055" : "#2d3a50"}`,
                  cursor:"pointer", textAlign:"left"
                }}>
                  <div style={{width:20, height:20, borderRadius:5, background: on?"#4ade80":"transparent", border:`2px solid ${on?"#4ade80":"#3d4a60"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:"#042008", flexShrink:0}}>{on?"✓":""}</div>
                  <div style={{fontSize:12, fontWeight:700, color: on?"#4ade80":"#4a5568", flex:1}}>{item.label}</div>
                  {item.sharedGroup && <div style={{fontSize:10, color:"#4a5568", letterSpacing:"0.08em"}}>shared</div>}
                </button>
              );
            })}
          </div>
          <div style={{fontSize:11, color:"#4a5568", marginTop:8}}>Bodyweight always included. Add equipment in ⚙ Admin → Equipment.</div>
        </div>

        <div style={{...S.card, marginBottom:28, lineHeight:2.1}}>
          {[
            ["Exercises", `${chosen.length} selected`],
            ["Work / Rest", `${fmtSec(workSec)} on · ${fmtSec(restSec)} rest`],
            ["Circuits", `${numCircuits}×`],
            ["Est. Duration", `~${estMins} min`],
            numPeople>1 && ["Stagger", "1 exercise offset per person"],
          ].filter(Boolean).map(([k,v])=>(
            <div key={k} style={{display:"flex", justifyContent:"space-between", fontSize:13}}>
              <span style={{color:"#718096"}}>{k}</span>
              <span style={{color:"#e2e8f0", fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>

        <button onClick={()=>setScreen("review")} style={S.btnPri}>Review Exercises →</button>
      </div>
    </div>
  );

  // ── REVIEW ───────────────────────────────────────────────────────────
  if (screen==="review") {
    const selectedIds = new Set(chosen.map(e=>e.id));

    const toggleEx = (ex) => {
      setOptimised(false);
      if (selectedIds.has(ex.id)) {
        if (chosen.length > 1) setChosen(prev=>prev.filter(e=>e.id!==ex.id));
      } else {
        setChosen(prev=>[...prev, ex]);
      }
    };

    const handleOptimise = () => {
      setChosen(prev=>optimiseCircuit(prev));
      setOptimised(true);
    };

    const visibleDb = db.filter(ex => {
      if (!showUnavail && !isExAvail(ex, availEquip, equipDb)) return false;
      if (reviewFilter!=="all" && ex.type!==reviewFilter) return false;
      if (reviewSearch && !ex.name.toLowerCase().includes(reviewSearch.toLowerCase()) && !ex.equipment.toLowerCase().includes(reviewSearch.toLowerCase())) return false;
      return true;
    });

    const kitIssues = validateSharedKit(chosen);

    return (
      <div style={S.page}>
        <div style={{width:"100%", maxWidth:600}}>

          {/* Header */}
          <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:20}}>
            <button onClick={()=>setScreen("setup")} style={S.btnSec}>← Back</button>
            <div style={{fontSize:12, letterSpacing:"0.18em", color:"#718096", fontWeight:600}}>SELECT EXERCISES</div>
          </div>

          {/* Selected count + optimise */}
          <div style={{...S.card, marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between", gap:12}}>
            <div>
              <div style={{fontSize:18, fontWeight:700, color:"#f7fafc"}}>{chosen.length} <span style={{fontSize:13, color:"#718096", fontWeight:400}}>selected</span></div>
              <div style={{fontSize:11, color:"#4a5568", marginTop:2}}>Target: {numExercises} per circuit</div>
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:8, alignItems:"flex-end"}}>
              <button onClick={handleOptimise} style={{background:"#1e3a2e", border:"1px solid #4ade8066", borderRadius:8, color:"#4ade80", fontSize:12, fontWeight:700, padding:"9px 14px", fontFamily:"'DM Mono',monospace", cursor:"pointer", letterSpacing:"0.08em", whiteSpace:"nowrap"}}>
                ✦ Optimise Order
              </button>
              {optimised && <div style={{fontSize:10, color:"#4ade80", letterSpacing:"0.1em"}}>✓ ORDER OPTIMISED</div>}
            </div>
          </div>

          {/* Kit clash warning */}
          {kitIssues.length>0 && (
            <div style={{background:"#2d1500", border:"1px solid #f87171", borderRadius:10, padding:"12px 14px", marginBottom:16}}>
              <div style={{fontSize:11, color:"#fc8181", fontWeight:700, marginBottom:4}}>⚠ Equipment clash — tap Optimise to fix</div>
              {kitIssues.map((m,i)=><div key={i} style={{fontSize:11, color:"#feb2b2"}}>{m}</div>)}
            </div>
          )}

          {/* Selected exercises — ordered list */}
          {chosen.length>0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11, color:"#718096", letterSpacing:"0.14em", fontWeight:600, marginBottom:10}}>YOUR CIRCUIT — tap to remove</div>
              <div style={{display:"flex", flexDirection:"column", gap:6}}>
                {chosen.map((ex,i)=>{
                  const tc=TYPE_COLORS[ex.type]||TYPE_COLORS.strength;
                  const avail=isExAvail(ex, availEquip, equipDb);
                  return (
                    <button key={ex.id} onClick={()=>toggleEx(ex)}
                      style={{display:"flex", alignItems:"center", gap:10, background:"#1a2a1e", border:"1px solid #2d4a35", borderRadius:10, padding:"10px 12px", cursor:"pointer", textAlign:"left", width:"100%"}}>
                      {/* Tick */}
                      <div style={{width:22, height:22, borderRadius:6, background:"#4ade80", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:13, fontWeight:700, color:"#042008"}}>✓</div>
                      {/* GIF thumb */}
                      <div style={{width:40, height:40, borderRadius:6, overflow:"hidden", flexShrink:0, background:"#0d1525"}}>
                        {ex.gif&&<img src={ex.gif} alt="" style={{width:"100%", height:"100%", objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/>}
                      </div>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:13, fontWeight:700, color:"#f7fafc", marginBottom:2}}>{String(i+1).padStart(2,"0")}. {ex.name}</div>
                        <div style={{display:"flex", gap:5, flexWrap:"wrap", alignItems:"center"}}>
                          <span style={{fontSize:9, color:tc.accent, background:`${tc.accent}20`, padding:"1px 6px", borderRadius:3, letterSpacing:"0.08em", fontWeight:600}}>{tc.label}</span>
                          {ex.shared&&<div style={{width:6, height:6, borderRadius:"50%", background:EQUIP_COLORS[ex.shared]}}/>}
                          <span style={{fontSize:10, color:"#718096"}}>{ex.equipment}</span>
                          {!avail&&(
                            <span style={{fontSize:9, color:"#fb923c", background:"#fb923c20", padding:"2px 6px", borderRadius:3, fontWeight:600}}>⚠ Missing</span>
                          )}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Divider */}
          <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:16}}>
            <div style={{flex:1, height:1, background:"#2d3a50"}}/>
            <div style={{fontSize:11, color:"#4a5568", letterSpacing:"0.1em"}}>ADD MORE</div>
            <div style={{flex:1, height:1, background:"#2d3a50"}}/>
          </div>

          {/* Search */}
          <input value={reviewSearch} onChange={e=>setReviewSearch(e.target.value)} placeholder="Search exercises…"
            style={{width:"100%", background:"#1a2035", border:"1px solid #2d3a50", borderRadius:10, padding:"11px 14px", color:"#e8eaed", fontSize:13, fontFamily:"'DM Mono',monospace", outline:"none", boxSizing:"border-box", marginBottom:12}}/>

          {/* Type filter + show unavailable toggle */}
          <div style={{display:"flex", gap:6, marginBottom:16, flexWrap:"wrap"}}>
            {["all",...TYPE_OPTIONS].map(t=>{
              const tc=t==="all"?null:TYPE_COLORS[t]; const on=reviewFilter===t;
              return <button key={t} onClick={()=>setReviewFilter(t)} style={{padding:"5px 12px", borderRadius:20, fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:"0.08em", cursor:"pointer", textTransform:"uppercase", fontWeight:600, background:on?(tc?tc.accent:"#f7fafc"):"#1a2035", color:on?"#042008":(tc?tc.accent:"#a0aec0"), border:on?"none":`1px solid ${tc?tc.accent+"44":"#2d3a50"}`}}>{t}</button>;
            })}
            <button onClick={()=>setShowUnavail(s=>!s)} style={{
              padding:"5px 12px", borderRadius:20, fontSize:11,
              background: showUnavail ? "#f8717120" : "#1a2035",
              color: showUnavail ? "#f87171" : "#4a5568",
              border: showUnavail ? "1px solid #f8717144" : "1px solid #2d3a50",
              fontFamily:"'DM Mono',monospace", letterSpacing:"0.08em", fontWeight:600, cursor:"pointer"
            }}>{showUnavail ? "✕ Unavailable" : "Show unavailable"}</button>
          </div>

          {/* Floating selected counter */}
          <div style={{position:"fixed", top:16, right:16, zIndex:50, background:"#4ade80", color:"#042008", borderRadius:20, padding:"6px 14px", fontSize:13, fontWeight:700, fontFamily:"'DM Mono',monospace", boxShadow:"0 4px 16px rgba(0,0,0,0.4)", pointerEvents:"none"}}>
            {chosen.length} selected
          </div>

          {/* Full exercise library — tap to add */}
          <div style={{display:"flex", flexDirection:"column", gap:6, marginBottom:24}}>
            {visibleDb.map(ex=>{
              const tc=TYPE_COLORS[ex.type]||TYPE_COLORS.strength;
              const isSelected=selectedIds.has(ex.id);
              const avail=isExAvail(ex, availEquip, equipDb);
              const exItem=getExEquipItem(ex, equipDb);
              return (
                <button key={ex.id} onClick={()=>toggleEx(ex)}
                  style={{display:"flex", alignItems:"center", gap:12, background:isSelected?"#111a10":"#111520", border:`1px solid ${isSelected?"#2d4a35":"#1e2a3a"}`, borderRadius:10, padding:"12px 14px", cursor:"pointer", textAlign:"left", width:"100%", opacity:avail?1:0.45}}>
                  {/* Checkbox only — no gif square */}
                  <div style={{width:24, height:24, borderRadius:6, border:`2px solid ${isSelected?"#4ade80":"#3d4a60"}`, background:isSelected?"#4ade80":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:14, fontWeight:700, color:"#042008", transition:"all 0.15s"}}>
                    {isSelected?"✓":""}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:14, fontWeight:600, color:isSelected?"#8ab89a":"#f0f4f8", marginBottom:4, lineHeight:1.3}}>{ex.name}</div>
                    <div style={{display:"flex", gap:6, flexWrap:"wrap", alignItems:"center"}}>
                      <span style={{fontSize:10, color:tc.accent, background:`${tc.accent}22`, padding:"2px 7px", borderRadius:4, letterSpacing:"0.08em", fontWeight:700}}>{tc.label}</span>
                      <span style={{fontSize:11, color:"#8a9bb0"}}>{ex.equipment}</span>
                      {!avail&&(
                        <span style={{fontSize:9, color:"#f87171", background:"#f8717120", padding:"2px 6px", borderRadius:3, fontWeight:600}}>⊘ {exItem?.label||ex.equipment}</span>
                      )}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          {/* Equipment summary */}
          <div style={{...S.card, marginBottom:20}}>
            <div style={{fontSize:11, color:"#718096", letterSpacing:"0.14em", fontWeight:600, marginBottom:10}}>EQUIPMENT NEEDED</div>
            {[...new Set(chosen.map(e=>e.equipment))].map(eq=>{
              const item = equipDb.find(e=>e.label===eq);
              const missing = item && !item.alwaysAvail && !availEquip.has(item.id);
              return (
                <div key={eq} style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
                  <div style={{width:7, height:7, borderRadius:"50%", flexShrink:0, background:item?.sharedGroup==="kettlebell"?EQUIP_COLORS.kettlebell:item?.sharedGroup==="medball"?EQUIP_COLORS.medball:"#4a5568"}}/>
                  <span style={{fontSize:12, color: missing?"#fb923c":"#c8d4e0"}}>{eq}</span>
                  {missing&&<span style={{fontSize:9, color:"#fb923c", background:"#fb923c20", padding:"2px 5px", borderRadius:3, fontWeight:600}}>⚠ not available</span>}
                </div>
              );
            })}
          </div>

          {/* Test audio */}
          <button onClick={()=>{
            try {
              if (!audioRef.current) audioRef.current = new (window.AudioContext||window.webkitAudioContext)();
              if (audioRef.current.state==="suspended") audioRef.current.resume();
              const p=new SpeechSynthesisUtterance(" "); p.volume=0; window.speechSynthesis.speak(p);
            } catch(e){}
            beep(880,0.15,0.6,0); beep(1320,0.22,0.6,0.2);
          }} style={{...S.btnSec, width:"100%", marginBottom:12, textAlign:"center"}}>
            🔊 Test Audio
          </button>

          {/* Start */}
          <button onClick={startSession} disabled={chosen.length===0||kitIssues.length>0}
            style={{...S.btnPri, background:chosen.length===0||kitIssues.length>0?"#1a2035":"#4ade80", color:chosen.length===0||kitIssues.length>0?"#4a5568":"#042008", cursor:chosen.length===0||kitIssues.length>0?"not-allowed":"pointer"}}>
            {kitIssues.length>0?"Tap Optimise to fix clashes":chosen.length===0?"Select at least 1 exercise":`Start Session ▶  (${chosen.length} exercises)`}
          </button>
        </div>
      </div>
    );
  }

  // ── DONE ─────────────────────────────────────────────────────────────
  if (screen==="done") return (
    <div style={{...S.page, justifyContent:"center", textAlign:"center", minHeight:"100vh"}}>
      <div style={{fontSize:64, marginBottom:20}}>🏆</div>
      <div style={{fontSize:42, fontWeight:700, fontFamily:"Georgia,serif", color:"#f7fafc", marginBottom:10}}>Done.</div>
      <div style={{color:"#718096", fontSize:14, marginBottom:8}}>{numCircuits} circuit{numCircuits>1?"s":""} · {numPeople} person{numPeople>1?"s":""}</div>
      <div style={{color:"#4ade80", fontSize:15, letterSpacing:"0.08em", marginBottom:48}}>{mm}:{ss} · Great work everyone</div>
      <button onClick={goHome} style={{...S.btnSec, fontSize:14, padding:"14px 40px", color:"#e2e8f0", borderColor:"#3d4a60"}}>⌂ Home</button>
    </div>
  );

  // ── ACTIVE ────────────────────────────────────────────────────────────
  const people = Array.from({length:numPeople},(_,i)=>{
    const idx = masterIdx - i;
    const slot = idx >= 0 && idx < seq.length ? seq[idx] : null;
    return { name:names[i]||`P${i+1}`, color:PERSON_COLORS[i],
             slot: (slot && !slot._padding) ? slot : null };
  });
  const focusData = focusPerson!==null ? people[focusPerson] : null;

  return (
    <div style={{height:"100vh", background:"#0d0f12", color:"#e8eaed", fontFamily:"'DM Mono','Courier New',monospace", display:"flex", flexDirection:"column", boxSizing:"border-box", position:"relative", overflow:"hidden"}}>

      {/* Ambient glow */}
      <div style={{position:"fixed", inset:0, zIndex:0, background:isResting?"radial-gradient(ellipse at 50% 0%, #0b2210 0%, #0d0f12 55%)":`radial-gradient(ellipse at 50% 0%, ${mType.bg} 0%, #0d0f12 55%)`, transition:"background 0.7s ease", pointerEvents:"none"}}/>

      {/* ── TOP BAR ── */}
      <div style={{position:"relative", zIndex:1, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 18px 0", flexShrink:0}}>
        <div style={{fontSize:10, letterSpacing:"0.2em", color:"#4a5568", fontWeight:600}}>CIRCUIT TRAINING</div>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <div style={{fontSize:13, color:"#718096", fontWeight:600}}>{mm}:{ss}</div>
          <button onClick={toggleFullscreen} style={{background:"transparent", border:"none", color:"#4a5568", fontSize:16, cursor:"pointer", padding:"2px 4px", lineHeight:1}} title={isFullscreen?"Exit fullscreen":"Fullscreen"}>
            {isFullscreen ? "⊡" : "⛶"}
          </button>
        </div>
      </div>
      <div style={{position:"relative", zIndex:1, margin:"6px 18px 0", height:2, background:"#1e2a3a", borderRadius:2, overflow:"hidden", flexShrink:0}}>
        <div style={{height:"100%", width:`${progPct}%`, background:isResting?"#4ade80":mType.accent, transition:"width 1s linear, background 0.5s"}}/>
      </div>
      <div style={{position:"relative", zIndex:1, display:"flex", justifyContent:"space-between", padding:"3px 18px 0", fontSize:9, color:"#2d3a50", flexShrink:0}}>
        <span>SLOT {Math.max(1,masterIdx-(numPeople-1)+1)}/{Math.max(1,totalSlots-(numPeople-1))}</span><span>{Math.round(progPct)}%</span>
      </div>

      {/* ── TIMER — full width centred on mobile ── */}
      <div style={{position:"relative", zIndex:1, display:"flex", flexDirection:"column", alignItems:"center", paddingTop:10, flexShrink:0}}>
        <div style={{position:"relative", width:130, height:130}}>
          <svg width="130" height="130" style={{transform:"rotate(-90deg)"}}>
            <circle cx="65" cy="65" r="54" fill="none" stroke="#1e2a3a" strokeWidth="5"/>
            <circle cx="65" cy="65" r="54" fill="none" stroke={ringColor} strokeWidth="5"
              strokeDasharray={circ} strokeDashoffset={dash} strokeLinecap="round"
              style={{transition:"stroke-dashoffset 1s linear, stroke 0.3s"}}/>
          </svg>
          <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"}}>
            <div style={{fontSize:42, fontWeight:700, lineHeight:1, color:ringColor, transition:"color 0.3s", fontFamily:"'DM Mono',monospace"}}>{timeLeft}</div>
            <div style={{fontSize:10, color:"#718096", letterSpacing:"0.12em", marginTop:4, fontWeight:600}}>
              {paused?"PAUSED":isResting?"REST":isCD?"FINISH":"GO"}
            </div>
          </div>
        </div>

        {/* Circuit progress dots horizontal under timer */}
        <div style={{display:"flex", gap:10, marginTop:8}}>
          {Array.from({length:numCircuits},(_,i)=>{
            const p1idx = masterIdx - (numPeople-1);
            const start=i*chosen.length, end=start+chosen.length-1;
            const done=p1idx>end, active=p1idx>=start&&p1idx<=end;
            return (
              <div key={i} style={{display:"flex", alignItems:"center", gap:4}}>
                <div style={{width:6, height:6, borderRadius:"50%", background:done?"#4ade80":active?mType.accent:"#2d3a50", transition:"background 0.4s"}}/>
                <div style={{fontSize:9, color:done?"#4ade80":active?"#e2e8f0":"#3d4a60", letterSpacing:"0.1em", fontWeight:600}}>C{i+1}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── PARTICIPANT TILES — scrollable grid below timer ── */}
      <div style={{position:"relative", zIndex:1, flex:1, overflowY:"auto", padding:"10px 14px 0", minHeight:0}}>
        {focusPerson!==null&&focusData ? (
          <div style={{paddingBottom:8}}>
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12}}>
              <button onClick={()=>setFocusPerson(null)} style={{...S.btnSec, padding:"7px 14px", fontSize:11}}>← All</button>
              <div style={{fontSize:14, color:"#e2e8f0", fontWeight:600}}>{focusData.name}</div>
            </div>
            {focusData.slot
              ? <PersonCard slot={focusData.slot} color={focusData.color} large isResting={isResting}/>
              : <div style={{...S.card, textAlign:"center", color:"#718096", fontSize:14, padding:"32px"}}>Session complete</div>
            }
          </div>
        ):(
          <div>
          {isResting&&(
            <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:12, padding:"8px 4px"}}>
              <div style={{flex:1, height:1, background:"#4ade8033"}}/>
              <div style={{fontSize:13, fontWeight:700, letterSpacing:"0.2em", color:"#4ade80"}}>▼ UP NEXT</div>
              <div style={{flex:1, height:1, background:"#4ade8033"}}/>
            </div>
          )}
          <div style={{
            display:"grid",
            gridTemplateColumns: numPeople===1 ? "1fr" : "1fr 1fr",
            gap:10,
            paddingBottom:8,
          }}>
            {people.map((p,i)=>(
              <div key={i} style={{display:"flex", flexDirection:"column"}}>
                <div style={{fontSize:14, fontWeight:700, color:p.color, letterSpacing:"0.1em", textTransform:"uppercase", paddingBottom:5, paddingLeft:8, borderLeft:`3px solid ${p.color}`, marginBottom:4}}>{p.name}</div>
                <button onClick={()=>setFocusPerson(i)}
                  style={{background:"transparent", border:"none", padding:0, cursor:"pointer", textAlign:"left", display:"block", flex:1}}>
                  <PersonCard slot={p.slot} isResting={isResting}/>
                </button>
              </div>
            ))}
          </div>
          </div>
        )}
      </div>

      {/* ── FOOTER — pinned, always visible ── */}
      <div style={{position:"relative", zIndex:2, display:"flex", gap:10, padding:"10px 14px 20px", flexShrink:0, background:"linear-gradient(to bottom, transparent, #0d0f12 35%)"}}>
        <button onClick={()=>setPaused(p=>!p)} style={{flex:1, padding:"14px", background:paused?"#4ade80":"#1a2035", color:paused?"#042008":"#a0aec0", border:paused?"none":"1px solid #2d3a50", borderRadius:10, fontSize:13, fontWeight:paused?700:500, fontFamily:"'DM Mono',monospace", letterSpacing:"0.12em", cursor:"pointer", textTransform:"uppercase"}}>
          {paused?"▶ Resume":"⏸ Pause"}
        </button>
        <button onClick={goHome} style={{...S.btnSec, padding:"14px 20px", fontSize:13, color:"#c8d4e0", borderColor:"#3d4a60"}}>
          ⌂ Home
        </button>
      </div>
    </div>
  );
}

// ── Person Card ───────────────────────────────────────────────────────────────
function PersonCard({ slot, color, name, isResting, large, showName }) {
  const [gifErr, setGifErr] = useState(false);
  if (!slot) return (
    <div style={{background:"#111520", border:"1px solid #1e2a3a", borderRadius:12, padding:"18px", opacity:0.5}}>
      <div style={{fontSize:12, color:"#718096"}}>Done</div>
    </div>
  );
  const tc = TYPE_COLORS[slot.type]||TYPE_COLORS.strength;
  return (
    <div style={{background:"#1a2035", border:`1px solid ${isResting?"#1e4a2e":tc.bg==="#0a0a0a"?"#2d3a50":tc.bg}`, borderRadius:large?16:12, overflow:"hidden", height:"100%", boxSizing:"border-box", transition:"border-color 0.4s"}}>

      {/* GIF banner on large card, small thumb on grid */}
      {slot.gif && !gifErr && (
        <div style={{width:"100%", height:large?160:80, background:"#0d1525", overflow:"hidden", position:"relative"}}>
          <img src={slot.gif} alt={slot.name} onError={()=>setGifErr(true)}
            style={{width:"100%", height:"100%", objectFit:"cover", opacity:0.85}}/>
          <div style={{position:"absolute", inset:0, background:"linear-gradient(to bottom, transparent 40%, #1a2035 100%)"}}/>
        </div>
      )}

      <div style={{padding:large?"16px 20px 20px":"12px 14px 14px"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, marginBottom:large?10:6}}>
          <div style={{fontSize:large?20:14, fontWeight:700, lineHeight:1.2, fontFamily:"Georgia,serif", color:"#f7fafc"}}>{slot.label||slot.name}</div>
          <div style={{display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0}}>
            <div style={{background:`${tc.accent}20`, border:`1px solid ${tc.accent}44`, borderRadius:6, padding:"3px 8px", fontSize:10, color:tc.accent, letterSpacing:"0.06em", textTransform:"uppercase", fontWeight:700}}>
              {tc.label}
            </div>
          </div>
        </div>

        {large&&(<>
          <div style={{fontSize:14, color:"#cbd5e0", lineHeight:1.7, marginBottom:12, borderLeft:`3px solid ${tc.accent}77`, paddingLeft:12}}>{slot.cues}</div>
          <div style={{fontSize:12, color:"#a0aec0", marginBottom:6}}>{slot.muscles}</div>
          <div style={{display:"flex", alignItems:"center", gap:7}}>
            {slot.shared&&<div style={{width:7, height:7, borderRadius:"50%", background:EQUIP_COLORS[slot.shared]}}/>}
            <div style={{fontSize:12, color:"#a0aec0"}}>{slot.equipment}</div>
          </div>
        </>)}

        {!large&&(<>
          <div style={{fontSize:11, color:"#a0aec0", marginBottom:5, fontWeight:500}}>{slot.equipment}</div>
          <div style={{fontSize:11, color:"#8a9bb0", lineHeight:1.5, marginBottom:6}}>{slot.cues?.slice(0,60)}{slot.cues?.length>60?"…":""}</div>
          <div style={{fontSize:10, color:"#60a5fa", fontWeight:600}}>tap to expand ↗</div>
        </>)}
      </div>
    </div>
  );
}

// ── Timing Slider ─────────────────────────────────────────────────────────────
function Slider({ label, value, min, max, step, onChange, accent }) {
  const pct = ((value-min)/(max-min))*100;
  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
        <span style={{fontSize:13, color:"#e2e8f0", letterSpacing:"0.1em", fontWeight:600}}>{label.toUpperCase()}</span>
        <span style={{fontSize:18, fontWeight:700, color:accent, fontFamily:"'DM Mono',monospace"}}>{fmtSec(value)}</span>
      </div>
      <div style={{position:"relative", height:36, display:"flex", alignItems:"center"}}>
        <div style={{position:"absolute", left:0, right:0, height:4, background:"#2d3a50", borderRadius:2}}/>
        <div style={{position:"absolute", left:0, width:`${pct}%`, height:4, background:accent, borderRadius:2}}/>
        <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))}
          style={{position:"absolute", left:0, right:0, width:"100%", opacity:0, height:36, cursor:"pointer", margin:0}}/>
        <div style={{position:"absolute", left:`calc(${pct}% - 11px)`, width:22, height:22, borderRadius:"50%", background:accent, boxShadow:`0 0 10px ${accent}99`, pointerEvents:"none"}}/>
      </div>
      <div style={{display:"flex", justifyContent:"space-between", marginTop:5, fontSize:10, color:"#4a5568"}}>
        <span>{fmtSec(min)}</span><span>{fmtSec(max)}</span>
      </div>
    </div>
  );
}

// ── Admin Screen ──────────────────────────────────────────────────────────────
const EMPTY_EX = { id:"", name:"", equipment:"", shared:null, cues:"", muscles:"", type:"strength", gif:"" };

function AdminScreen({ db, setDb, onBack, initAudio, beep, availEquip, toggleEquip, equipDb, setEquipDb }) {
  const [adminTab,    setAdminTab]   = useState("exercises");
  const [editing,    setEditing]    = useState(null);
  const [form,       setForm]       = useState(EMPTY_EX);
  const [filter,     setFilter]     = useState("all");
  const [search,     setSearch]     = useState("");
  const [deleteId,   setDeleteId]   = useState(null);
  const [addStep,    setAddStep]    = useState("describe");
  const [nlInput,    setNlInput]    = useState("");
  const [llmLoading, setLlmLoading] = useState(false);
  const [llmError,   setLlmError]   = useState("");
  const [preview,    setPreview]    = useState(null);
  const [newEquipName,   setNewEquipName]   = useState("");
  const [newEquipShared, setNewEquipShared] = useState("");

  const openNew  = () => { setForm({...EMPTY_EX, id:Date.now().toString(36)}); setNlInput(""); setLlmError(""); setAddStep("describe"); setEditing("new"); };
  const openEdit = ex => { setForm({...ex}); setEditing(ex.id); setAddStep("review"); };
  const cancel   = () => { setEditing(null); setForm(EMPTY_EX); setNlInput(""); setLlmError(""); };
  const save     = () => {
    if (!form.name.trim()||!form.equipment.trim()) return;
    setDb(prev=>editing==="new"?[...prev,{...form}]:prev.map(e=>e.id===editing?{...form}:e));
    cancel();
  };

  const fillLlm = async () => {
    if (!nlInput.trim()) return;
    setLlmLoading(true); setLlmError("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:`You are a fitness expert. Given a description of an exercise, return ONLY a JSON object with these fields:
- name: short exercise name
- equipment: one of ${equipDb.map(e=>JSON.stringify(e.label)).join(", ")}
- shared: null${equipDb.filter(e=>e.sharedGroup).map(e=>`, "${e.sharedGroup}"`).filter((v,i,a)=>a.indexOf(v)===i).join("")}
- muscles: e.g. "Quads · Glutes · Core"
- cues: 1-2 sentence coaching instruction
- type: "strength", "cardio", "power", "core", or "mobility"
- gif: leave as empty string ""
No markdown, no explanation, just the JSON object.`,
          messages:[{role:"user",content:nlInput}]
        })
      });
      const data = await res.json();
      const text = (data.content||[]).map(c=>c.text||"").join("");
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      setForm(f=>({...f, ...parsed, id:f.id, gif:parsed.gif||f.gif||""}));
      setAddStep("review");
    } catch(e) {
      setLlmError("Couldn't parse response — fill manually."); setAddStep("review");
    } finally { setLlmLoading(false); }
  };

  const filtered = db.filter(ex=>(filter==="all"||ex.type===filter)&&(!search||ex.name.toLowerCase().includes(search.toLowerCase())||ex.equipment.toLowerCase().includes(search.toLowerCase())));

  const inStyle = {width:"100%", background:"#111825", border:"1px solid #2d3a50", borderRadius:10, padding:"12px 14px", color:"#e8eaed", fontSize:13, fontFamily:"'DM Mono',monospace", outline:"none", boxSizing:"border-box"};

  const addEquipItem = () => {

  return (
    <div style={S.page}>
      <div style={{width:"100%", maxWidth:600}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
          <button onClick={onBack} style={S.btnSec}>← Back</button>
          <div style={{fontSize:11, letterSpacing:"0.2em", color:"#718096", fontWeight:600}}>ADMIN</div>
          {adminTab==="exercises"
            ? <button onClick={openNew} style={{background:"#4ade80", color:"#042008", border:"none", borderRadius:8, fontSize:12, fontWeight:700, padding:"9px 16px", fontFamily:"'DM Mono',monospace", cursor:"pointer"}}>+ ADD</button>
            : <div style={{width:64}}/>
          }
        </div>

        {/* Tab bar */}
        <div style={{display:"flex", gap:6, marginBottom:24}}>
          {[["exercises","Exercises"],["equipment","Equipment"]].map(([t,l])=>(
            <button key={t} onClick={()=>setAdminTab(t)} style={{
              flex:1, padding:"11px", borderRadius:9, fontSize:12, fontWeight:700,

              background: adminTab===t ? "#4ade80" : "#1a2035",
              color: adminTab===t ? "#042008" : "#a0aec0",
              border: adminTab===t ? "none" : "1px solid #2d3a50"
            }}>{l}</button>

        </div>

        {/* ── EQUIPMENT TAB ── */}
        {adminTab==="equipment" && (
          <div>

            <div style={{display:"flex", flexDirection:"column", gap:8, marginBottom:28}}>
              {equipDb.map(item => {
                const on = item.alwaysAvail || availEquip.has(item.id);

            </div>
          </div>

        {/* ── EXERCISES TAB ── */}
        {adminTab==="exercises" && (<div>
        <div style={{...S.h1, fontSize:26, marginBottom:20}}>

        </div>

          style={{...inStyle, marginBottom:14}}/>

        <div style={{display:"flex", gap:7, marginBottom:22, flexWrap:"wrap"}}>
          {["all",...TYPE_OPTIONS].map(t=>{const tc=t==="all"?null:TYPE_COLORS[t],on=filter===t;return(
            <button key={t} onClick={()=>setFilter(t)} style={{padding:"6px 13px", borderRadius:20, fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:"0.08em", cursor:"pointer", textTransform:"uppercase", fontWeight:600, background:on?(tc?tc.accent:"#f7fafc"):"#1a2035", color:on?"#042008":(tc?tc.accent:"#a0aec0"), border:on?"none":`1px solid ${tc?tc.accent+"44":"#2d3a50"}`}}>{t}</button>
          );})}
        </div>

        <div style={{display:"flex", flexDirection:"column", gap:10, marginBottom:24}}>
          {filtered.map(ex=>{const tc=TYPE_COLORS[ex.type]||TYPE_COLORS.strength; return(
            <div key={ex.id} style={{background:"#1a2035", border:"1px solid #2d3a50", borderRadius:12, overflow:"hidden"}}>
              <div style={{display:"flex", gap:0}}>
                {/* GIF thumb */}
                {ex.gif&&(
                  <div style={{width:72, flexShrink:0, background:"#0d1525", cursor:"pointer"}} onClick={()=>setPreview(ex)}>
                    <img src={ex.gif} alt={ex.name} style={{width:"100%", height:"100%", objectFit:"cover", display:"block"}}
                      onError={e=>{e.target.parentElement.style.display="none";}}/>
                  </div>
                )}
                <div style={{flex:1, padding:"14px"}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8}}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap"}}>
                        <div style={{width:7, height:7, borderRadius:"50%", flexShrink:0, background:ex.shared?(EQUIP_COLORS[ex.shared]||"#4a5568"):"#4a5568"}}/>
                        <div style={{fontSize:15, fontWeight:700, color:"#f0f4f8"}}>{ex.name}</div>
                        <div style={{fontSize:9, color:tc.accent, background:`${tc.accent}20`, padding:"2px 7px", borderRadius:4, letterSpacing:"0.08em", fontWeight:600}}>{tc.label}</div>
                      </div>
                      <div style={{fontSize:12, color:"#a0aec0", marginBottom:3}}>{ex.equipment}{ex.shared?` · shared: ${ex.shared}`:""}</div>
                      <div style={{fontSize:11, color:"#718096", lineHeight:1.5}}>{ex.muscles}</div>
                    </div>
                    <div style={{display:"flex", gap:6, flexShrink:0}}>
                      <button onClick={()=>openEdit(ex)} style={{background:"#1e2a3a", border:"1px solid #2d3a50", borderRadius:7, color:"#a0aec0", fontSize:11, padding:"6px 10px", fontFamily:"'DM Mono',monospace", cursor:"pointer", fontWeight:600}}>Edit</button>
                      <button onClick={()=>setDeleteId(ex.id)} style={{background:"#2d1010", border:"1px solid #f8717144", borderRadius:7, color:"#fc8181", fontSize:11, padding:"6px 10px", fontFamily:"'DM Mono',monospace", cursor:"pointer", fontWeight:600}}>✕</button>
                    </div>
                  </div>
                  {ex.cues&&<div style={{fontSize:11, color:"#718096", marginTop:8, paddingTop:8, borderTop:"1px solid #1e2a3a", lineHeight:1.6}}>{ex.cues}</div>}
                </div>
              </div>
            </div>
          );})}
          {filtered.length===0&&<div style={{textAlign:"center", color:"#4a5568", fontSize:13, padding:"36px 0"}}>No exercises found</div>}
        </div>
        </div>)} {/* end exercises tab */}
      </div>

      {/* GIF Preview Modal */}
      {preview&&(
        <div style={{position:"fixed", inset:0, background:"#0d0f12ee", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:20}} onClick={()=>setPreview(null)}>
          <div style={{background:"#1a2035", borderRadius:16, overflow:"hidden", maxWidth:400, width:"100%"}}>
            <img src={preview.gif} alt={preview.name} style={{width:"100%", display:"block"}}/>
            <div style={{padding:"14px 18px"}}>
              <div style={{fontSize:16, fontWeight:700, color:"#f7fafc", marginBottom:4}}>{preview.name}</div>
              <div style={{fontSize:13, color:"#a0aec0", lineHeight:1.6}}>{preview.cues}</div>
            </div>
          </div>
        </div>
      )}

      {/* Add/Edit Modal */}
      {editing!==null&&(
        <div style={{position:"fixed", inset:0, background:"#0d0f12f0", zIndex:100, display:"flex", alignItems:"flex-end", justifyContent:"center"}} onClick={cancel}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1a2035", border:"1px solid #2d3a50", borderRadius:"18px 18px 0 0", padding:"26px 22px 44px", width:"100%", maxWidth:600, maxHeight:"92vh", overflowY:"auto", boxSizing:"border-box"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22}}>
              <div style={{fontSize:16, fontWeight:700, color:"#f7fafc"}}>{editing==="new"?(addStep==="describe"?"Describe Exercise":"Review & Edit"):"Edit Exercise"}</div>
              {editing==="new"&&addStep==="review"&&<button onClick={()=>{setAddStep("describe");setLlmError("");}} style={{...S.btnSec, fontSize:11, padding:"6px 12px"}}>← Re-describe</button>}
            </div>

            {editing==="new"&&addStep==="describe"&&(
              <div>
                <div style={{background:"#111825", border:"1px solid #3d4a60", borderRadius:10, padding:"16px", marginBottom:20}}>
                  <div style={{fontSize:11, color:"#60a5fa", letterSpacing:"0.14em", marginBottom:8, fontWeight:700}}>✦ AI FILL</div>
                  <div style={{fontSize:13, color:"#a0aec0", lineHeight:1.7}}>Describe the exercise in plain English — AI fills all fields automatically.</div>
                </div>
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:11, color:"#a0aec0", letterSpacing:"0.14em", marginBottom:10, fontWeight:600}}>DESCRIBE THE EXERCISE</div>
                  <textarea value={nlInput} onChange={e=>setNlInput(e.target.value)} rows={5}
                    placeholder={'e.g. "F45 favourite — a kettlebell swing where you hinge at hips and drive the bell to shoulder height"\n\nor: "Barry\'s treadmill interval — 30 second all-out sprint at high incline"'}
                    style={{...inStyle, resize:"vertical", lineHeight:1.65}} autoFocus/>
                </div>
                {llmError&&<div style={{background:"#2d1000", border:"1px solid #f87171", borderRadius:8, padding:"11px 14px", fontSize:12, color:"#fc8181", marginBottom:14}}>{llmError}</div>}
                <div style={{display:"flex", gap:10}}>
                  <button onClick={cancel} style={{...S.btnSec, flex:1, textAlign:"center"}}>Cancel</button>
                  <button onClick={fillLlm} disabled={!nlInput.trim()||llmLoading}
                    style={{flex:2, padding:"14px", borderRadius:10, border:"none", background:!nlInput.trim()||llmLoading?"#1e2a3a":"#60a5fa", color:!nlInput.trim()||llmLoading?"#4a5568":"#042008", fontSize:13, fontWeight:700, letterSpacing:"0.1em", fontFamily:"'DM Mono',monospace", cursor:!nlInput.trim()||llmLoading?"not-allowed":"pointer", textTransform:"uppercase", display:"flex", alignItems:"center", justifyContent:"center", gap:8}}>
                    {llmLoading?<><Spinner/>Thinking…</>:"✦ Fill with AI"}
                  </button>
                </div>
                <button onClick={()=>setAddStep("review")} style={{width:"100%", marginTop:12, background:"transparent", border:"none", color:"#4a5568", fontSize:12, fontFamily:"'DM Mono',monospace", cursor:"pointer", textDecoration:"underline"}}>Skip — fill manually</button>
              </div>
            )}

            {(editing!=="new"||addStep==="review")&&(
              <div>
                {editing==="new"&&!llmError&&form.name&&<div style={{background:"#0a2010", border:"1px solid #4ade8066", borderRadius:8, padding:"11px 14px", marginBottom:18, fontSize:13, color:"#68d391"}}>✓ Fields filled — review and adjust as needed</div>}

                {[["Name","name",""],["Equipment","equipment","e.g. 12kg Kettlebell"],["Muscles","muscles","e.g. Quads · Glutes · Core"],["GIF URL (optional)","gif","https://media.giphy.com/…"]].map(([l,k,ph])=>(
                  <div key={k} style={{marginBottom:16}}>
                    <div style={{fontSize:11, color:"#a0aec0", letterSpacing:"0.14em", marginBottom:8, fontWeight:600}}>{l.toUpperCase()}</div>
                    <input value={form[k]||""} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={inStyle}/>
                  </div>
                ))}
                {form.gif&&<div style={{marginBottom:16, borderRadius:8, overflow:"hidden"}}><img src={form.gif} alt="preview" style={{width:"100%", maxHeight:160, objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/></div>}

                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11, color:"#a0aec0", letterSpacing:"0.14em", marginBottom:8, fontWeight:600}}>CUES</div>
                  <textarea value={form.cues} onChange={e=>setForm(f=>({...f,cues:e.target.value}))} placeholder="Coaching cue shown during session…" rows={3} style={{...inStyle, resize:"vertical"}}/>
                </div>

                <div style={{marginBottom:18}}>
                  <div style={{fontSize:11, color:"#a0aec0", letterSpacing:"0.14em", marginBottom:10, fontWeight:600}}>TYPE</div>
                  <div style={{display:"flex", gap:7, flexWrap:"wrap"}}>
                    {TYPE_OPTIONS.map(t=>{const tc=TYPE_COLORS[t],on=form.type===t;return(
                      <button key={t} onClick={()=>setForm(f=>({...f,type:t}))} style={{padding:"7px 13px", borderRadius:20, fontSize:11, fontFamily:"'DM Mono',monospace", letterSpacing:"0.08em", cursor:"pointer", textTransform:"uppercase", fontWeight:600, background:on?tc.accent:"#1e2a3a", color:on?"#042008":tc.accent, border:on?"none":`1px solid ${tc.accent}44`}}>{t}</button>
                    );})}
                  </div>
                </div>

                <div style={{marginBottom:22}}>
                  <div style={{fontSize:11, color:"#a0aec0", letterSpacing:"0.14em", marginBottom:10, fontWeight:600}}>SHARED EQUIPMENT</div>
                  <div style={{display:"flex", gap:9}}>
                    {[null,"kettlebell","medball"].map(s=>(
                      <button key={String(s)} onClick={()=>setForm(f=>({...f,shared:s}))} style={{flex:1, padding:"9px", borderRadius:9, fontSize:12, fontFamily:"'DM Mono',monospace", cursor:"pointer", fontWeight:600, background:form.shared===s?"#f7fafc":"#1e2a3a", color:form.shared===s?"#042008":"#a0aec0", border:form.shared===s?"none":"1px solid #2d3a50"}}>{s===null?"None":s}</button>
                    ))}
                  </div>
                </div>

                <div style={{display:"flex", gap:10}}>
                  <button onClick={cancel} style={{...S.btnSec, flex:1, textAlign:"center"}}>Cancel</button>
                  <button onClick={save} disabled={!form.name.trim()||!form.equipment.trim()} style={{flex:2, padding:"14px", borderRadius:10, border:"none", background:!form.name.trim()||!form.equipment.trim()?"#1e2a3a":"#4ade80", color:!form.name.trim()||!form.equipment.trim()?"#4a5568":"#042008", fontSize:13, fontWeight:700, letterSpacing:"0.1em", fontFamily:"'DM Mono',monospace", cursor:"pointer", textTransform:"uppercase"}}>
                    {editing==="new"?"Add Exercise":"Save Changes"}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {deleteId&&(
        <div style={{position:"fixed", inset:0, background:"#0d0f12cc", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20}} onClick={()=>setDeleteId(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1a2035", border:"1px solid #2d3a50", borderRadius:16, padding:"30px 26px", width:"100%", maxWidth:360, textAlign:"center"}}>
            <div style={{fontSize:17, fontWeight:700, color:"#f7fafc", marginBottom:10}}>Delete exercise?</div>
            <div style={{fontSize:13, color:"#a0aec0", marginBottom:26}}>{db.find(e=>e.id===deleteId)?.name}</div>
            <div style={{display:"flex", gap:10}}>
              <button onClick={()=>setDeleteId(null)} style={{...S.btnSec, flex:1, textAlign:"center"}}>Cancel</button>
              <button onClick={()=>{setDb(p=>p.filter(e=>e.id!==deleteId));setDeleteId(null);}} style={{flex:1, padding:"12px", borderRadius:9, border:"none", background:"#f87171", color:"#042008", fontSize:13, fontWeight:700, fontFamily:"'DM Mono',monospace", cursor:"pointer"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Spinner() {
  return <svg width="14" height="14" viewBox="0 0 14 14" style={{animation:"spin 0.8s linear infinite"}}><style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style><circle cx="7" cy="7" r="5" fill="none" stroke="#042008" strokeWidth="2" strokeDasharray="20 10"/></svg>;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CircuitTrainer));
</script></body></html>
